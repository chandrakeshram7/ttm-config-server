server:
  port: 8080


spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: task-service
              uri: lb://TASK-SERVICE}
              predicates:
                - Path=/api/v1/tasks/**
              filters:
                - StripPrefix=2

            - id: project-service
              uri: lb://PROJECT-SERVICE}
              predicates:
                - Path=/api/v1/projects/**
              filters:
                - StripPrefix=2

            - id: user-service
              uri: lb://USER-SERVICE}
              predicates:
                - Path=/api/v1/users/**
              filters:
                - StripPrefix=2
                
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:1
              
